# NAS compose — house-of-light (10.0.0.250)
# Deploy path: /volume1/docker/ai/docker-compose.yml
# See docs/specs/lightrag-vault-indexer.md and docs/specs/ai-stack.md

services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale-nas
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - /volume1/docker/tailscale:/var/lib/tailscale
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_HOSTNAME=house-of-light
      - TS_SERVE_CONFIG=/var/lib/tailscale/serve-config.json
    restart: always

  lightrag:
    image: ghcr.io/hkuds/lightrag:latest
    container_name: lightrag
    restart: always
    ports:
      - "9621:9621"
    environment:
      - LLM_BINDING=ollama
      - LLM_MODEL=llama3.2:3b
      - LLM_BINDING_HOST=http://10.0.0.243:11435
      - EMBEDDING_BINDING=ollama
      - EMBEDDING_MODEL=mxbai-embed-large
      - EMBEDDING_BINDING_HOST=http://10.0.0.243:11436
      - WORKING_DIR=/app/data/rag_storage
      - LIGHTRAG_API_KEY=${LIGHTRAG_API_KEY}
    volumes:
      - /volume1/docker/ai/lightrag:/app/data
      - /volume1/obsidian-vault:/vault:ro
    networks:
      - ai-net

  vault-indexer:
    image: vault-indexer:latest
    container_name: vault-indexer
    restart: always
    environment:
      - LIGHTRAG_URL=http://lightrag:9621
      - LIGHTRAG_API_KEY=${LIGHTRAG_API_KEY}
      - VAULT_PATH=/vault
    volumes:
      - /volume1/obsidian-vault:/vault:ro
      - /volume1/docker/ai/vault-indexer:/state
    networks:
      - ai-net

  lightrag-mcp:
    image: lightrag-mcp:latest
    container_name: lightrag-mcp
    restart: always
    ports:
      - "3002:3002"
    command:
      - lightrag-mcp
      - --host
      - lightrag
      - --port
      - "9621"
      - --api-key
      - ${LIGHTRAG_API_KEY}
      - --mcp-transport
      - streamable-http
      - --mcp-host
      - "0.0.0.0"
      - --mcp-port
      - "3002"
      - --mcp-streamable-http-path
      - /mcp
      - --mcp-stateless-http
    networks:
      - ai-net
    depends_on:
      - lightrag

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --schedule "0 0 4 * * *" --cleanup
    networks:
      - ai-net

networks:
  ai-net:
    driver: bridge
