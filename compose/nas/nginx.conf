# NAS nginx — TLS termination + reverse proxy
# Cert: house-of-light.your-tailnet.ts.net
# Renew: docker exec tailscale-nas tailscale cert house-of-light.your-tailnet.ts.net

events {
    worker_connections 1024;
}

http {
    # Redirect HTTP → HTTPS
    server {
        listen 80;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name house-of-light.your-tailnet.ts.net;

        ssl_certificate     /etc/nginx/certs/house-of-light.your-tailnet.ts.net.crt;
        ssl_certificate_key /etc/nginx/certs/house-of-light.your-tailnet.ts.net.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # LibreChat
        location / {
            proxy_pass         http://10.0.0.243:3080;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
        }

        # Phase 3 — MCP routes (uncomment when services are up)
        # location /mcp/lightrag {
        #     proxy_pass http://127.0.0.1:3001;
        #     proxy_http_version 1.1;
        #     proxy_set_header Connection "";
        # }
        # location /mcp/ha {
        #     proxy_pass http://10.0.0.5:8123/mcp;
        # }
    }
}
