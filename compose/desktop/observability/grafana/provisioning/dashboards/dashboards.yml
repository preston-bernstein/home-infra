# Shared observability stack — Grafana dashboard provider config.
# Watches the dashboards/ directory (mounted read-only in ../../../docker-compose.yml
# at /etc/grafana/dashboards-data — a SIBLING path to /etc/grafana/provisioning,
# not nested inside it, since /etc/grafana/provisioning is itself a read-only
# bind mount and Docker cannot create a mountpoint inside an already-read-only
# parent mount) for JSON dashboard files exported from the legacy Grafana
# instances (a sibling build task populates that folder).

apiVersion: 1

providers:
  - name: default
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /etc/grafana/dashboards-data
