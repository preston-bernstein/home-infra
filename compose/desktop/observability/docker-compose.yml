# Shared observability stack — desktop (10.0.0.243)
# Deploy path: /opt/docker/observability/docker-compose.yml (owner: observability service user)
#
# Consolidates the duplicate fashion-monitor (:3001) and financial-pipeline (:3200)
# Grafana/Loki stacks into one shared Prometheus + Loki + Grafana + Alloy stack
# (ADR 0016). Prometheus scrapes node-exporter and cAdvisor directly; Alloy is
# logs-only here, shipping Docker container logs to Loki (see alloy/config.alloy,
# a sibling build task — not authored by this file).
#
# NOTE: mem_limit/cpus values below are conservative placeholders. Preston should
# tune these against real observed usage once the stack has been running a while.

networks:
  observability_net:
    name: observability_net
    driver: bridge

services:
  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: observability-prometheus-1
    user: "${PUID}:${PGID}"
    restart: unless-stopped
    networks:
      - observability_net
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${DATA_ROOT:-/opt/docker/observability}/prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --storage.tsdb.retention.size=5GB
      - --web.enable-lifecycle
    environment:
      - TZ=${TZ:-America/New_York}
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--timeout=5", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  grafana:
    image: grafana/grafana:11.5.2
    container_name: observability-grafana-1
    user: "${PUID}:${PGID}"
    restart: unless-stopped
    networks:
      - observability_net
    ports:
      - "${GRAFANA_PORT:-3300}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ${DATA_ROOT:-/opt/docker/observability}/grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      # Sibling path, NOT nested under /etc/grafana/provisioning: that mount is
      # itself read-only, and Docker cannot create a mountpoint inside an
      # already-read-only parent bind mount (verified: this exact nesting
      # failed at container start with "read-only file system").
      - ./dashboards:/etc/grafana/dashboards-data:ro
    depends_on:
      - prometheus
      - loki
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --timeout=5 http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  loki:
    image: grafana/loki:3.5.0
    container_name: observability-loki-1
    user: "${PUID}:${PGID}"
    restart: unless-stopped
    networks:
      - observability_net
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - ${DATA_ROOT:-/opt/docker/observability}/loki-data:/loki
    command:
      - -config.file=/etc/loki/loki-config.yml
    environment:
      - TZ=${TZ:-America/New_York}
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--timeout=5", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Alloy needs docker.sock access to discover and tail container logs, so it
  # intentionally does NOT get a `user:` override (must run as the image's
  # default/root user). Its River pipeline config (config.alloy) is task 1b's
  # output, not this task's — the mount below just points at where 1b will
  # write it.
  alloy:
    image: grafana/alloy:v1.9.1
    container_name: observability-alloy-1
    restart: unless-stopped
    networks:
      - observability_net
    ports:
      - "127.0.0.1:12345:12345"
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - ${DATA_ROOT:-/opt/docker/observability}/alloy-data:/var/lib/alloy/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    environment:
      - TZ=${TZ:-America/New_York}
    depends_on:
      - loki
    mem_limit: 256m
    cpus: 0.3
    healthcheck:
      # Alloy's image (Ubuntu 24.04 base) has bash but no wget/curl (verified
      # live — wget healthcheck failed with "not found"). bash's /dev/tcp is
      # a bash builtin, not an external binary, so it works without either.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/12345 && exec 3<&-' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: observability-node-exporter-1
    user: "${PUID}:${PGID}"
    restart: unless-stopped
    networks:
      - observability_net
    # No `ports:` block — internal-only via observability_net. node-exporter's
    # metrics are reached by Prometheus over the bridge network, never published
    # to the host/LAN.
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host/root
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    mem_limit: 128m
    cpus: 0.2
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --timeout=5 http://localhost:9100/metrics >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # cAdvisor needs docker.sock + host cgroup/rootfs access, so it intentionally
  # does NOT get a `user:` override (must run as the image's default/root user).
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: observability-cadvisor-1
    restart: unless-stopped
    networks:
      - observability_net
    # No `ports:` block — host port 8080 is already taken by gluetun on the
    # real desktop; cadvisor is reached only by Prometheus over
    # observability_net, never published to the host/LAN.
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    mem_limit: 128m
    cpus: 0.2
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --timeout=5 http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
