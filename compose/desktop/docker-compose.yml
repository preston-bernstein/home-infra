# Desktop compose — multimedia (10.0.0.243)
# Deploy path: /opt/docker/librechat-stack/docker-compose.yml
# See docs/specs/ai-stack.md — Phase 2 (historical intent only; badly stale)

services:
  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat
    restart: always
    network_mode: host
    volumes:
      - /opt/docker/librechat-stack/data/librechat:/app/data
      - /opt/docker/librechat-stack/librechat.yaml:/app/librechat.yaml:ro
    env_file:
      - path: .env
        required: false

  vision-mcp:
    image: vision-mcp:latest
    container_name: vision-mcp
    restart: always
    network_mode: host
    environment:
      - OLLAMA_HOST=http://localhost:11435
      - VISION_MODEL=llava:13b
      - LIBRECHAT_HOST=http://localhost:3080
      - MCP_PORT=3003

  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: always
    volumes:
      - /opt/docker/librechat-stack/data/mongodb:/data/db
    ports:
      - "27017:27017"

  proton-email-mcp:
    build:
      context: /opt/docker/librechat-stack/proton-email-mcp
      dockerfile: Dockerfile
    image: proton-email-mcp:latest
    container_name: proton-email-mcp
    restart: always
    network_mode: host
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=3004
      - PROTON_USERNAME=${PROTON_USERNAME}
      - PROTON_PASSWORD=${PROTON_PASSWORD}
      - PROTON_BRIDGE_HOST=localhost
      - PROTON_BRIDGE_IMAP_PORT=1143
      - PROTON_BRIDGE_SMTP_PORT=1025
